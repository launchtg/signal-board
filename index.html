<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Board | Launch Technology Group</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #E8862A;
      --primary-bright: #F0A050;
      --deep-green: #0B3D2E;
      --pine-green: #1A5C45;
      --warm-ivory: #F5F0E8;
      --navy: #1B2A4A;
      --slate: #64748B;
      --bg: #0B3D2E;
      --bg-surface: #0D4A36;
      --bg-card: #10573F;
      --bg-card-hover: #146B4D;
      --border: #1A7A58;
      --text: #F5F0E8;
      --text-muted: #A8C4B8;
      --text-dim: #6B9E88;
      --destructive: #ef4444;
      --warning: #f59e0b;
      --success: #22c55e;
      --info: #5BA4D9;
      --radius: 0.75rem;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-mark {
      height: 28px;
      width: auto;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .header h1 span { color: var(--primary); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.25rem 0.625rem;
      border-radius: 999px;
      background: rgba(232, 134, 42, 0.1);
      color: var(--primary);
      border: 1px solid rgba(232, 134, 42, 0.2);
    }

    .date {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .source-note {
      padding: 0.75rem 2rem 0;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .source-note code {
      color: var(--primary);
    }

    .board {
      display: flex;
      gap: 1.25rem;
      padding: 1.5rem 2rem;
      min-height: calc(100vh - 70px);
      overflow-x: auto;
    }

    .column {
      min-width: 340px;
      max-width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .column-header-left {
      display: flex;
      align-items: center;
      gap: 0.625rem;
    }

    .column-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .column-dot.ideas { background: var(--primary); }
    .column-dot.design { background: var(--info); }
    .column-dot.validation { background: var(--warning); }
    .column-dot.build { background: var(--primary-bright); }
    .column-dot.live { background: var(--success); }

    .column-title {
      font-size: 0.825rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .column-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
    }

    .column-cards {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      flex: 1;
      min-height: 200px;
      padding: 0.75rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-style: dashed;
    }

    .column-cards.has-cards { border-style: solid; }

    .card {
      background: var(--warm-ivory);
      border: 1px solid #E0D9CE;
      border-radius: var(--radius);
      padding: 1rem;
      cursor: grab;
      transition: all 0.15s ease;
      color: var(--deep-green);
      position: relative;
    }

    .card.card-clickable { cursor: pointer; }

    .card:hover {
      background: #EDE8DF;
      border-color: var(--primary);
      transform: translateY(-1px);
    }

    .card:active { cursor: grabbing; }

    .card.card-clickable:after {
      content: 'VIEW DOSSIER';
      position: absolute;
      top: 0.8rem;
      right: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.05em;
      color: #8A8377;
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }

    .card.card-clickable:hover:after {
      opacity: 1;
    }

    .card-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.375rem;
      letter-spacing: -0.01em;
      color: var(--deep-green);
    }

    .card-domain {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      color: var(--slate);
      font-weight: 400;
    }

    .card-pain {
      font-size: 0.775rem;
      color: var(--slate);
      line-height: 1.5;
      margin-bottom: 0.75rem;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-bottom: 0.625rem;
    }

    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.625rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: rgba(11, 61, 46, 0.08);
      color: var(--deep-green);
      border: 1px solid rgba(11, 61, 46, 0.15);
    }

    .tag.api {
      background: rgba(27, 42, 74, 0.08);
      color: var(--navy);
      border-color: rgba(27, 42, 74, 0.15);
    }

    .tag.market {
      background: rgba(232, 134, 42, 0.1);
      color: #B8651A;
      border-color: rgba(232, 134, 42, 0.2);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.625rem;
      border-top: 1px solid #D5CEC3;
    }

    .score {
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .score-bar {
      width: 60px;
      height: 4px;
      background: #D5CEC3;
      border-radius: 2px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--primary);
    }

    .score-label, .mvp-time, .card-pricing, .expand-btn {
      font-family: 'JetBrains Mono', monospace;
    }

    .score-label, .mvp-time {
      font-size: 0.65rem;
      color: var(--slate);
    }

    .card-pricing {
      font-size: 0.65rem;
      color: #B8651A;
      margin-top: 0.375rem;
    }

    .card.dragging { opacity: 0.4; }
    .column-cards.drag-over {
      background: rgba(232, 134, 42, 0.03);
      border-color: var(--primary);
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 0.8rem;
      font-style: italic;
      text-align: center;
      min-height: 120px;
    }

    .card-expand {
      display: none;
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #D5CEC3;
      font-size: 0.75rem;
      color: var(--slate);
      line-height: 1.6;
    }

    .card-expand h4 {
      color: var(--deep-green);
      font-size: 0.725rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0.5rem 0 0.25rem;
    }

    .card-expand h4:first-child { margin-top: 0; }
    .card.expanded .card-expand { display: block; }

    .expand-btn {
      background: none;
      border: none;
      color: var(--slate);
      font-size: 0.7rem;
      cursor: pointer;
      padding: 0.25rem 0;
    }

    .expand-btn:hover { color: var(--primary); }

    .card-assets {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-top: 0.625rem;
      padding-top: 0.625rem;
      border-top: 1px solid #D5CEC3;
    }

    .asset-link {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      background: var(--deep-green);
      color: var(--warm-ivory);
      border: 1px solid var(--pine-green);
      text-decoration: none;
      transition: all 0.15s ease;
    }

    .asset-link:hover {
      background: var(--pine-green);
      border-color: var(--primary);
    }

    .asset-link.brand-link,
    .asset-link.logo-link,
    .asset-link.ui-link {
      background: var(--deep-green);
      color: var(--warm-ivory);
      border-color: var(--pine-green);
      font-weight: 700;
    }

    .asset-link.pending-approval {
      background: #C86B1F;
      color: #FFF9F2;
      border-color: #9E4F12;
    }

    .asset-link.pending-approval:hover {
      background: #B95E15;
      border-color: #8D430B;
    }

    .card-logo-preview {
      width: 100%;
      margin-top: 0.5rem;
      border-radius: 0.5rem;
      border: 1px solid #D5CEC3;
    }

    .validation-tracker {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px solid #D5CEC3;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
    }

    .validation-item {
      background: rgba(11, 61, 46, 0.04);
      border: 1px solid rgba(11, 61, 46, 0.1);
      border-radius: 6px;
      padding: 0.45rem 0.5rem;
    }

    .validation-label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      color: var(--slate);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.15rem;
    }

    .validation-value {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--deep-green);
      word-break: break-word;
    }

    .validation-status {
      margin-top: 0.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      padding: 0.3rem 0.5rem;
      border-radius: 999px;
      background: rgba(245, 158, 11, 0.12);
      color: #B45309;
      border: 1px solid rgba(245, 158, 11, 0.22);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      max-width: 900px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .modal-close {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: all 0.15s ease;
    }

    .modal-close:hover {
      background: var(--bg-card-hover);
      color: var(--text);
      border-color: var(--primary);
    }

    .modal-body {
      padding: 1.25rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-body img {
      max-width: 100%;
      border-radius: 0.5rem;
      border: 1px solid var(--border);
    }

    .modal-body.markdown {
      font-size: 0.825rem;
      line-height: 1.7;
      color: var(--text);
    }

    .modal-body.markdown h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 0.75rem;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .modal-body.markdown h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 1.5rem 0 0.5rem;
      color: var(--primary);
      letter-spacing: -0.01em;
    }

    .modal-body.markdown h3 {
      font-size: 0.9rem;
      font-weight: 600;
      margin: 1.25rem 0 0.375rem;
      color: var(--text);
    }

    .modal-body.markdown h4 {
      font-size: 0.8rem;
      font-weight: 600;
      margin: 1rem 0 0.25rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .modal-body.markdown p { margin: 0.5rem 0; }
    .modal-body.markdown ul, .modal-body.markdown ol { padding-left: 1.25rem; margin: 0.375rem 0; }
    .modal-body.markdown li { margin: 0.2rem 0; }

    .modal-body.markdown code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      background: var(--bg-card);
      padding: 0.15rem 0.375rem;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .modal-body.markdown pre {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      padding: 1rem;
      overflow-x: auto;
      margin: 0.75rem 0;
    }

    .modal-body.markdown pre code {
      background: none;
      border: none;
      padding: 0;
    }

    .modal-body.markdown table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.75rem 0;
      font-size: 0.775rem;
    }

    .modal-body.markdown th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 2px solid var(--border);
      color: var(--primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .modal-body.markdown td {
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-body.markdown hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    .modal-body.markdown strong { color: var(--text); font-weight: 600; }
    .modal-body.markdown a { color: var(--primary); text-decoration: none; }
    .modal-body.markdown a:hover { text-decoration: underline; }

    .modal-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .modal-footer {
      padding: 0.75rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .modal-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
    }

    .modal-btn-secondary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .modal-btn-secondary:hover {
      border-color: var(--primary);
      color: var(--text);
    }

    .modal-btn-primary {
      background: rgba(232, 134, 42, 0.15);
      border: 1px solid rgba(232, 134, 42, 0.3);
      color: var(--primary);
    }

    .modal-btn-primary:hover { background: rgba(232, 134, 42, 0.25); }

    .modal-body.dossier {
      background: linear-gradient(180deg, #FBF8F2 0%, #F6F1E7 100%);
      color: var(--deep-green);
      padding: 0;
    }

    .dossier-shell {
      padding: 1.5rem;
      display: grid;
      gap: 1.25rem;
    }

    .dossier-hero {
      background: rgba(255,255,255,0.72);
      border-bottom: 1px solid #E6DED0;
      padding: 1.5rem 1.5rem 1.25rem;
    }

    .dossier-kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8A8377;
      margin-bottom: 0.5rem;
    }

    .dossier-hero h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--deep-green);
    }

    .dossier-subhead {
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--slate);
      max-width: 62ch;
    }

    .dossier-meta-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.8rem;
      margin-top: 1rem;
    }

    .dossier-meta-card {
      background: rgba(11, 61, 46, 0.04);
      border: 1px solid rgba(11, 61, 46, 0.1);
      border-radius: 10px;
      padding: 0.85rem;
    }

    .dossier-meta-label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8A8377;
      margin-bottom: 0.3rem;
    }

    .dossier-meta-value {
      font-size: 0.86rem;
      line-height: 1.45;
      color: var(--deep-green);
    }

    .dossier-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 1rem;
      padding: 0 1.5rem 1.5rem;
    }

    .dossier-column {
      display: grid;
      gap: 1rem;
      align-content: start;
    }

    .dossier-section {
      background: rgba(255,255,255,0.75);
      border: 1px solid #E6DED0;
      border-radius: 14px;
      padding: 1rem 1rem 0.95rem;
    }

    .dossier-section h3 {
      margin: 0 0 0.55rem;
      font-size: 0.95rem;
      letter-spacing: -0.01em;
      color: var(--deep-green);
    }

    .dossier-section p {
      margin: 0;
      font-size: 0.82rem;
      line-height: 1.65;
      color: var(--slate);
      white-space: pre-wrap;
    }

    .dossier-links,
    .dossier-bullets {
      display: grid;
      gap: 0.6rem;
      margin-top: 0.15rem;
    }

    .dossier-link-item,
    .dossier-bullet-item {
      padding: 0.7rem 0.8rem;
      background: rgba(11, 61, 46, 0.03);
      border: 1px solid rgba(11, 61, 46, 0.08);
      border-radius: 10px;
    }

    .dossier-link-item a {
      color: var(--deep-green);
      text-decoration: none;
      font-size: 0.8rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .dossier-link-item a:hover { text-decoration: underline; }

    .dossier-quote {
      font-size: 0.8rem;
      line-height: 1.65;
      color: var(--slate);
      padding-left: 0.85rem;
      border-left: 3px solid rgba(232, 134, 42, 0.55);
    }

    .dossier-final {
      border-color: rgba(232, 134, 42, 0.28);
      background: rgba(232, 134, 42, 0.06);
    }

    .dossier-empty {
      font-size: 0.78rem;
      color: #8A8377;
      font-style: italic;
    }

    @media (max-width: 840px) {
      .dossier-meta-grid,
      .dossier-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <img src="https://raw.githubusercontent.com/launchtg/signal-board/main/assets/ltg-icon.png" alt="LTG" class="logo-mark">
      <h1><span>Signal</span> Board</h1>
    </div>
    <div class="header-right">
      <span class="badge" id="version-badge">v2.0 SIGNAL ENGINE</span>
      <span class="date" id="last-updated">2026-05-22</span>
    </div>
  </div>

  <div class="source-note">Source of truth: <code>projects.json</code> → rendered into this board.</div>

  <div class="board" id="board"></div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-secondary" id="modal-copy-btn" onclick="copyModalContent()">COPY</button>
        <a class="modal-btn modal-btn-primary" id="modal-open-external" href="#" target="_blank">OPEN IN NEW TAB</a>
      </div>
    </div>
  </div>

  <script>
    const board = document.getElementById('board');
    const overlay = document.getElementById('modal-overlay');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');
    const modalOpenBtn = document.getElementById('modal-open-external');
    let currentUrl = '';
    let boardData = null;

    fetch('./projects.json')
      .then(r => r.json())
      .then(data => { boardData = data; renderBoard(data); })
      .catch(err => {
        console.error(err);
        board.innerHTML = '<div class="empty-state" style="min-width:100%;">Failed to load projects.json</div>';
      });

    function renderBoard(data) {
      document.getElementById('version-badge').textContent = `${data.meta.version} ${data.meta.label}`;
      document.getElementById('last-updated').textContent = data.meta.lastUpdated;
      board.innerHTML = data.meta.stages.map(stage => renderColumn(stage, data.projects.filter(project => project.stage === stage.id))).join('');
      bindDragAndDrop();
    }

    function renderColumn(stage, projects) {
      return `
        <div class="column" id="col-${stage.id}">
          <div class="column-header">
            <div class="column-header-left">
              <div class="column-dot ${stage.dotClass}"></div>
              <span class="column-title">${stage.title}</span>
            </div>
            <span class="column-count" id="count-${stage.id}">${projects.length}</span>
          </div>
          <div class="column-cards ${projects.length ? 'has-cards' : ''}" id="cards-${stage.id}">
            ${projects.length ? projects.map(renderCard).join('') : `<div class="empty-state">${stage.emptyState}</div>`}
          </div>
        </div>`;
    }

    function renderCard(project) {
      const domain = project.domain ? `<span class="card-domain">${escapeHtml(project.domain)}</span>` : '';
      const tags = (project.tags || []).map(tag => `<span class="tag ${tag.class || ''}">${escapeHtml(tag.text)}</span>`).join('');
      const hasDossier = Array.isArray(project.details) && project.details.length > 0;
      const details = hasDossier
        ? `
          <button class="expand-btn" onclick="toggleExpand(this); event.stopPropagation();">+ details</button>
          <div class="card-expand">
            ${project.details.map(detail => `<h4>${escapeHtml(detail.title)}</h4>${escapeHtml(detail.text)}`).join('')}
          </div>`
        : '';
      const assets = project.assets ? renderAssets(project) : '';
      const validation = project.validation ? renderValidation(project.validation) : '';
      const logoPreview = project.assets?.logo
        ? `<img src="${rawUrl(project.assets.logo)}" alt="${escapeHtml(project.name)} logo" class="card-logo-preview">`
        : '';
      const clickAttrs = hasDossier
        ? `onclick="openProjectDossier('${escapeJs(project.id)}')" class="card card-clickable"`
        : `class="card"`;

      return `
        <div ${clickAttrs} draggable="true" data-id="${escapeHtml(project.id)}">
          <div class="card-name">${escapeHtml(project.name)} ${domain}</div>
          <div class="card-pain">${escapeHtml(project.pain)}</div>
          <div class="card-meta">${tags}</div>
          <div class="card-footer">
            <div class="score">
              <div class="score-bar"><div class="score-fill" style="width:${Number(project.scorePercent) || 0}%"></div></div>
              <span class="score-label">${escapeHtml(project.score || '')}</span>
            </div>
            <span class="mvp-time">${escapeHtml(project.mvpTime || '')}</span>
          </div>
          <div class="card-pricing">${escapeHtml(project.pricing || '')}</div>
          ${details}
          ${assets}
          ${validation}
          ${logoPreview}
        </div>`;
    }

    function renderAssets(project) {
      const pending = new Set(project.assets?.pendingApproval || []);
      const pendingClass = (key) => pending.has(key) ? ' pending-approval' : '';
      return `
        <div class="card-assets">
          ${project.assets.brandGuide ? `<a href="#" onclick="openModal('${escapeJs(project.name)} — Brand Guide','image','${rawUrl(project.assets.brandGuide)}');return false" class="asset-link brand-link${pendingClass('brandGuide')}">BRAND GUIDE</a>` : ''}
          ${project.assets.logo ? `<a href="#" onclick="openModal('${escapeJs(project.name)} — Logo','image','${rawUrl(project.assets.logo)}');return false" class="asset-link logo-link${pendingClass('logo')}">LOGO</a>` : ''}
          ${project.assets.uiMockup ? `<a href="#" onclick="openModal('${escapeJs(project.name)} — UI Mockup','image','${rawUrl(project.assets.uiMockup)}');return false" class="asset-link ui-link${pendingClass('uiMockup')}">UI MOCKUP</a>` : ''}
          ${project.assets.prd ? `<a href="#" onclick="openModal('${escapeJs(project.name)} — PRD','markdown','${rawUrl(project.assets.prd)}');return false" class="asset-link${pendingClass('prd')}">PRD</a>` : ''}
          ${project.assets.metaPrompt ? `<a href="#" onclick="openModal('${escapeJs(project.name)} — Meta Prompt','markdown','${rawUrl(project.assets.metaPrompt)}');return false" class="asset-link${pendingClass('metaPrompt')}">META PROMPT</a>` : ''}
        </div>`;
    }

    function renderValidation(validation) {
      return `
        <div class="validation-tracker">
          <div class="validation-item"><span class="validation-label">LP URL</span><span class="validation-value">${escapeHtml(validation.lpUrl || '—')}</span></div>
          <div class="validation-item"><span class="validation-label">Signups</span><span class="validation-value">${escapeHtml(validation.signups || '0')}</span></div>
          <div class="validation-item"><span class="validation-label">Qualified</span><span class="validation-value">${escapeHtml(validation.qualified || '0')}</span></div>
          <div class="validation-item"><span class="validation-label">Conversion</span><span class="validation-value">${escapeHtml(validation.conversion || '—')}</span></div>
          <div class="validation-item"><span class="validation-label">Traffic Source</span><span class="validation-value">${escapeHtml(validation.trafficSource || '—')}</span></div>
          <div class="validation-item"><span class="validation-label">Last Check</span><span class="validation-value">${escapeHtml(validation.lastCheck || '—')}</span></div>
        </div>
        <div class="validation-status">VALIDATION STATUS: ${escapeHtml(validation.status || 'UNKNOWN')}</div>`;
    }

    function openProjectDossier(projectId) {
      if (!boardData) return;
      const project = boardData.projects.find(p => p.id === projectId);
      if (!project) return;

      currentUrl = './projects.json';
      modalTitle.textContent = `${project.name} — Dossier`;
      modalBody.className = 'modal-body dossier';
      modalOpenBtn.href = './projects.json';
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      modalBody.innerHTML = renderDossier(project);
    }

    function renderDossier(project) {
      const detailMap = Object.fromEntries((project.details || []).map(d => [d.title, d.text]));
      const directLinks = splitLines(detailMap['Direct Evidence Links']);
      const quotes = splitLines(detailMap['Exact Quotes / Source Excerpts'] || detailMap['Quoted / Source Excerpts']);
      const risks = splitLines(detailMap['Risk Flags']);
      const kill = splitLines(detailMap['Kill Criteria']);
      const competitors = splitLines(detailMap['Competitors']);

      return `
        <div class="dossier-hero">
          <div class="dossier-kicker">Ideas dossier • ${escapeHtml((project.tags || []).map(t => t.text).join(' · ') || project.stage)}</div>
          <h1>${escapeHtml(project.name)}</h1>
          <div class="dossier-subhead">${escapeHtml(detailMap['One-Line Opportunity'] || project.pain || '')}</div>
          <div class="dossier-meta-grid">
            ${renderMetaCard('Target Buyer', detailMap['Target Buyer'])}
            ${renderMetaCard('Competition', project.competition)}
            ${renderMetaCard('MVP', project.mvpTime)}
            ${renderMetaCard('Pricing', project.pricing)}
          </div>
        </div>
        <div class="dossier-grid">
          <div class="dossier-column">
            ${renderSection('Painful Workflow', detailMap['Exact Painful Workflow'] || detailMap['Current Manual Workflow'])}
            ${renderSection('Why It Recurs', detailMap['Why It Recurs'] || detailMap['Workflow Friction'])}
            ${renderLinksSection('Direct Evidence Links', directLinks)}
            ${renderQuotesSection('Exact Quotes / Source Excerpts', quotes)}
            ${renderSection('Current Workaround', detailMap['Current Workaround'])}
            ${renderSection('Why The Workaround Is Bad', detailMap['Why Workaround Is Bad'] || detailMap['Existing Bad Solutions'])}
            ${renderListSection('Competitors', competitors)}
          </div>
          <div class="dossier-column">
            ${renderSection('Competitor Pricing', detailMap['Competitor Pricing'] || detailMap['Competitor Pricing If Findable'])}
            ${renderSection('Why Now', detailMap['Why Now'])}
            ${renderSection('Wedge', detailMap['Wedge'])}
            ${renderSection('Validation Angle', detailMap['Validation Angle'])}
            ${renderSection('First Traffic Source', detailMap['First Traffic Source'])}
            ${renderListSection('Risk Flags', risks)}
            ${renderListSection('Kill Criteria', kill)}
            ${renderSection('Final Verdict', detailMap['Final Verdict'] || detailMap['Verdict'], 'dossier-final')}
          </div>
        </div>`;
    }

    function renderMetaCard(label, value) {
      return `<div class="dossier-meta-card"><span class="dossier-meta-label">${escapeHtml(label)}</span><span class="dossier-meta-value">${escapeHtml(value || '—')}</span></div>`;
    }

    function renderSection(title, text, extraClass = '') {
      return `<section class="dossier-section ${extraClass}"><h3>${escapeHtml(title)}</h3>${text ? `<p>${escapeHtml(text)}</p>` : `<div class="dossier-empty">Not documented yet.</div>`}</section>`;
    }

    function renderLinksSection(title, lines) {
      if (!lines.length) return renderSection(title, '');
      return `<section class="dossier-section"><h3>${escapeHtml(title)}</h3><div class="dossier-links">${lines.map(line => {
        const url = extractFirstUrl(line);
        return `<div class="dossier-link-item">${url ? `<a href="${escapeHtml(url)}" target="_blank">${escapeHtml(line)}</a>` : escapeHtml(line)}</div>`;
      }).join('')}</div></section>`;
    }

    function renderQuotesSection(title, lines) {
      if (!lines.length) return renderSection(title, '');
      return `<section class="dossier-section"><h3>${escapeHtml(title)}</h3><div class="dossier-bullets">${lines.map(line => `<div class="dossier-bullet-item"><div class="dossier-quote">${escapeHtml(line)}</div></div>`).join('')}</div></section>`;
    }

    function renderListSection(title, lines) {
      if (!lines.length) return renderSection(title, '');
      return `<section class="dossier-section"><h3>${escapeHtml(title)}</h3><div class="dossier-bullets">${lines.map(line => `<div class="dossier-bullet-item">${escapeHtml(line)}</div>`).join('')}</div></section>`;
    }

    function splitLines(text) {
      if (!text) return [];
      return text.split(/\n+/).map(x => x.trim()).filter(Boolean);
    }

    function extractFirstUrl(text) {
      const match = text && text.match(/https?:\/\/\S+/);
      return match ? match[0] : '';
    }

    function bindDragAndDrop() {
      const cards = document.querySelectorAll('.card');
      const columns = document.querySelectorAll('.column-cards');

      cards.forEach(card => {
        card.addEventListener('dragstart', (e) => {
          card.classList.add('dragging');
          e.dataTransfer.setData('text/plain', card.dataset.id);
        });
        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          document.querySelectorAll('.column-cards').forEach(c => c.classList.remove('drag-over'));
          updateCounts();
        });
      });

      columns.forEach(col => {
        col.addEventListener('dragover', (e) => {
          e.preventDefault();
          col.classList.add('drag-over');
        });
        col.addEventListener('dragleave', () => {
          col.classList.remove('drag-over');
        });
        col.addEventListener('drop', (e) => {
          e.preventDefault();
          col.classList.remove('drag-over');
          const dragging = document.querySelector('.dragging');
          if (dragging) {
            const empty = col.querySelector('.empty-state');
            if (empty) empty.remove();
            col.appendChild(dragging);
            col.classList.add('has-cards');
            updateCounts();
          }
        });
      });
    }

    function updateCounts() {
      document.querySelectorAll('.column').forEach(column => {
        const cardsContainer = column.querySelector('.column-cards');
        const count = cardsContainer.querySelectorAll('.card').length;
        column.querySelector('.column-count').textContent = count;
        if (count === 0) {
          cardsContainer.classList.remove('has-cards');
          if (!cardsContainer.querySelector('.empty-state')) {
            const stageId = cardsContainer.id.replace('cards-', '');
            const emptyStates = {
              ideas: 'Waiting for Signal research',
              design: 'Drag ideas here to trigger design phase',
              validation: 'Landing page live, traffic running, signups tracked here',
              build: 'Validated demand, ready to build',
              live: 'Deployed and generating revenue'
            };
            const empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.textContent = emptyStates[stageId] || 'No cards';
            cardsContainer.appendChild(empty);
          }
        }
      });
    }

    function toggleExpand(btn) {
      const card = btn.closest('.card');
      card.classList.toggle('expanded');
      btn.textContent = card.classList.contains('expanded') ? '- collapse' : '+ details';
    }

    function openModal(title, type, url) {
      currentUrl = url;
      modalTitle.textContent = title;
      modalBody.className = 'modal-body';
      modalOpenBtn.href = url;
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';

      if (type === 'image') {
        modalBody.innerHTML = '<div class="modal-loading">Loading image...</div>';
        const img = new Image();
        img.onload = () => { modalBody.innerHTML = ''; modalBody.appendChild(img); };
        img.onerror = () => { modalBody.innerHTML = '<div class="modal-loading">Failed to load image</div>'; };
        img.src = url;
      } else if (type === 'markdown') {
        modalBody.innerHTML = '<div class="modal-loading">Loading document...</div>';
        modalBody.classList.add('markdown');
        fetch(url)
          .then(r => r.text())
          .then(md => { modalBody.innerHTML = renderMarkdown(md); })
          .catch(() => { modalBody.innerHTML = '<div class="modal-loading">Failed to load document</div>'; });
      }
    }

    function closeModal() {
      overlay.classList.remove('active');
      document.body.style.overflow = '';
      modalBody.innerHTML = '';
    }

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    function renderMarkdown(md) {
      let html = md
        .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/^---+$/gm, '<hr>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^\|(.+)\|$/gm, (match) => {
          const cells = match.split('|').filter(c => c.trim());
          if (cells.every(c => /^[\s-:]+$/.test(c))) return '<!--sep-->';
          return cells.map(c => `<td>${c.trim()}</td>`).join('');
        });

      const lines = html.split('\n');
      let inTable = false;
      const result = [];

      for (const line of lines) {
        if (line.includes('<td>') && !inTable) {
          inTable = true;
          result.push('<table>');
          result.push('<tr>' + line.replace(/<td>/g, '<th>').replace(/<\/td>/g, '</th>') + '</tr>');
        } else if (line === '<!--sep-->') {
          continue;
        } else if (line.includes('<td>') && inTable) {
          result.push('<tr>' + line + '</tr>');
        } else if (inTable && !line.includes('<td>')) {
          inTable = false;
          result.push('</table>');
          result.push(line);
        } else {
          result.push(line);
        }
      }
      if (inTable) result.push('</table>');

      html = result.join('\n');

      html = html.replace(/(^|\n)(- .+(\n- .+)*)/g, (match) => {
        const items = match.trim().split('\n').map(l => `<li>${l.replace(/^- /, '')}</li>`).join('');
        return `<ul>${items}</ul>`;
      });

      html = html.split('\n').map(line => {
        const trimmed = line.trim();
        if (!trimmed) return '';
        if (/^<[a-z]/.test(trimmed)) return trimmed;
        return `<p>${trimmed}</p>`;
      }).join('\n');

      return html;
    }

    function copyModalContent() {
      const text = modalBody.innerText;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('modal-copy-btn');
        btn.textContent = 'COPIED';
        setTimeout(() => { btn.textContent = 'COPY'; }, 1500);
      });
    }

    function rawUrl(path) {
      return `https://raw.githubusercontent.com/launchtg/signal-board/main/${path}`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeJs(str) {
      return String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }
  </script>
</body>
</html>
